<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GRPO Training on Zork1 - Interactive</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 40px; background: #fff; }
  h1 { font-size: 20px; text-align: center; margin-bottom: 20px; }
  .container { display: flex; justify-content: center; gap: 30px; }
  canvas { border: 1px solid #ddd; }
  .legend { padding: 10px 0; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    font-size: 13px; font-family: monospace; transition: background 0.15s;
  }
  .legend-item:hover { background: #f0f0f0; }
  .legend-item.dimmed { opacity: 0.25; }
  .legend-item.highlighted { background: #e8f0fe; }
  .legend-color { width: 28px; height: 4px; border-radius: 2px; flex-shrink: 0; }
  .legend-color { background: var(--c); }
  .tooltip {
    position: absolute; pointer-events: none; background: rgba(0,0,0,0.8);
    color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px;
    font-family: monospace; display: none; white-space: nowrap;
  }
</style>
</head>
<body>
<h1>GRPO Training on Zork1 (Qwen3-32B) - All Experiments</h1>
<div class="container">
  <canvas id="chart" width="860" height="480"></canvas>
  <div class="legend-wrapper">
    <p style="color:#333; font-size:15px; font-weight:600; margin: 0 0 12px 10px; background:#f0f4ff; padding:8px 12px; border-radius:6px; border-left:4px solid #4a7cff;">Hover over a legend entry to highlight that curve</p>
    <div class="legend" id="legend"></div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
const series = [
  { name: 'GRPO n=8, ppo=1, lr=1e-6, bs=1', color: '#2ca02c',
    data: [10,10,25,10,30,10,15,10,20,10,35,20,15,20,25,10,20,10,30,20,15,10,20,10,35,10,10,10,25,10,25,10,30,20,10,10,20,20,35,10,0,10,25,0,0,10,30,10,15,10] },
  { name: 'GRPO n=8, ppo=2, lr=1e-6, bs=1', color: '#d62728',
    data: [5,5,15,15,40,15,5,5,15,5,15,5,5,15,15,5,5,5,5,15,15,5,5,15,15,5,5,40,5,5,15,5,5,5,5,15,5,40,5,5,5,15,15,15,5,5,5,5,0,15] },
  { name: 'GRPO n=8, ppo=4, lr=1e-6, bs=1', color: '#1f77b4',
    data: [15,5,15,15,15,40,15,5,15,15,40,30,40,5,15,15,5,15,15,30,15,40,15,40,5,30,15,15,5,40,5,15,5,15,15,30,15,15,5,5,5,15,35,5,15,5,15,15,5,30] },
  { name: 'GRPO n=16, ppo=1, lr=1e-6, bs=1', color: '#17becf',
    data: [15,15,40,15,5,15,40,5,15,15,5,5,5,5,5,15,30,5,15,15,15,15,5,5,15,30,5,15,15,0,5,15,5,5,5,15,5,40,40,5,5,15,15,5,15,15,5,40,15,5] },
  { name: 'GRPO n=32, ppo=1, lr=1e-6, bs=1', color: '#9467bd',
    data: [5,15,30,15,5,5,15,5,15,15,15,15,15,15,5,5,5,15,15,15,5,15,15,5,5,15,0,5,15,15,15,40,-5,15,15,35,5,40,5,5,5,5,15,5,5,15,5,15,5,15] },
  { name: 'GRPO n=8, ppo=4, lr=1e-5, bs=1', color: '#bcbd22',
    data: [15,5,30,15,-5,15,15,5,5,15,5,5,15,15,15,30,15,30,25,35,30,5,5,25,15,40,45,35,40,35,39,30,40,45,39,40,29,35,30,35,35,15,35,35,40,35,30,35,40,35] },
  { name: 'GRPO n=8, ppo=1, lr=1e-5, bs=8', color: '#e377c2',
    data: [15,30,5,30,30,30,30,30,30,30,5,15,40,30,30,45,30,35,30,40,40,40,30,40,45,45,15,40,55,45,55,55,45,55,55,55,55,55,55,55,55,45,55,55,55,55,55,55,55,55] },
  { name: 'JitRL', color: '#ff0000',
    data: [10,25,15,35,35,25,40,44,40,50,30,44,50,35,50,44,35,50,44,30,44,40,40,50,44,44,50,35,50,44,44,50,44,50,35,44,40,50,50,44,50,44,50,50,50,44,50,44,50,50] },
];

// compute means
series.forEach(s => { s.mean = (s.data.reduce((a,b) => a+b, 0) / s.data.length).toFixed(1); });

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const legendEl = document.getElementById('legend');

const pad = { top: 30, right: 20, bottom: 50, left: 60 };
const W = canvas.width - pad.left - pad.right;
const H = canvas.height - pad.top - pad.bottom;

const N = 50;
const yMin = -10, yMax = 75;

function xPos(i) { return pad.left + (i / (N - 1)) * W; }
function yPos(v) { return pad.top + H - ((v - yMin) / (yMax - yMin)) * H; }

let highlighted = null;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
  for (let v = -10; v <= 70; v += 10) {
    ctx.beginPath(); ctx.moveTo(pad.left, yPos(v)); ctx.lineTo(pad.left + W, yPos(v)); ctx.stroke();
  }
  for (let i = 0; i < N; i += 5) {
    ctx.beginPath(); ctx.moveTo(xPos(i), pad.top); ctx.lineTo(xPos(i), pad.top + H); ctx.stroke();
  }

  // axes
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + H); ctx.lineTo(pad.left + W, pad.top + H); ctx.stroke();

  // labels
  ctx.fillStyle = '#333'; ctx.font = '12px monospace'; ctx.textAlign = 'right';
  for (let v = -10; v <= 70; v += 10) ctx.fillText(v, pad.left - 8, yPos(v) + 4);
  ctx.textAlign = 'center';
  for (let i = 0; i < N; i += 5) ctx.fillText(i + 1, xPos(i), pad.top + H + 20);
  ctx.font = '13px sans-serif';
  ctx.fillText('Step', pad.left + W / 2, pad.top + H + 42);
  ctx.save(); ctx.translate(16, pad.top + H / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('Zork1 Game Score', 0, 0); ctx.restore();

  // lines: draw dimmed first, then highlighted on top
  series.forEach((s, si) => {
    if (highlighted !== null && highlighted === si) return; // draw highlighted last
    ctx.strokeStyle = s.color;
    ctx.globalAlpha = highlighted !== null ? 0.12 : 1;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    s.data.forEach((v, i) => { i === 0 ? ctx.moveTo(xPos(i), yPos(v)) : ctx.lineTo(xPos(i), yPos(v)); });
    ctx.stroke();
  });
  if (highlighted !== null) {
    const s = series[highlighted];
    ctx.strokeStyle = s.color;
    ctx.globalAlpha = 1;
    ctx.lineWidth = 3;
    ctx.beginPath();
    s.data.forEach((v, i) => { i === 0 ? ctx.moveTo(xPos(i), yPos(v)) : ctx.lineTo(xPos(i), yPos(v)); });
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// legend
series.forEach((s, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const swatch = document.createElement('span');
  swatch.className = 'legend-color';
  swatch.style.setProperty('--c', s.color);
  const label = document.createElement('span');
  label.textContent = `${s.name} (mean=${s.mean})`;
  item.appendChild(swatch);
  item.appendChild(label);
  item.addEventListener('mouseenter', () => { highlighted = i; draw(); updateLegendStyles(); });
  item.addEventListener('mouseleave', () => { highlighted = null; draw(); updateLegendStyles(); });
  legendEl.appendChild(item);
});

function updateLegendStyles() {
  const items = legendEl.querySelectorAll('.legend-item');
  items.forEach((el, i) => {
    el.classList.toggle('dimmed', highlighted !== null && highlighted !== i);
    el.classList.toggle('highlighted', highlighted === i);
  });
}

// tooltip on canvas: find nearest line to cursor
let hoverLine = null;
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const step = Math.round(((mx - pad.left) / W) * (N - 1));
  if (step < 0 || step >= N || mx < pad.left || mx > pad.left + W || my < pad.top || my > pad.top + H) {
    tooltip.style.display = 'none';
    if (hoverLine !== null) { hoverLine = null; if (highlighted === null) draw(); }
    return;
  }
  // find closest series to cursor y at this step
  let minDist = Infinity, closest = null;
  series.forEach((s, si) => {
    const dy = Math.abs(my - yPos(s.data[step]));
    if (dy < minDist) { minDist = dy; closest = si; }
  });
  // only snap if within 15px
  if (minDist > 15) closest = null;

  if (closest !== hoverLine) {
    hoverLine = closest;
    if (highlighted === null) { // don't override legend highlight
      draw();
      // redraw hovered line on top
      if (hoverLine !== null) {
        const s = series[hoverLine];
        ctx.strokeStyle = s.color; ctx.globalAlpha = 1; ctx.lineWidth = 3;
        ctx.beginPath();
        s.data.forEach((v, i) => { i === 0 ? ctx.moveTo(xPos(i), yPos(v)) : ctx.lineTo(xPos(i), yPos(v)); });
        ctx.stroke(); ctx.globalAlpha = 1;
      }
    }
  }

  if (closest !== null) {
    const s = series[closest];
    tooltip.innerHTML = `<span style="color:${s.color}">\u25CF</span> <b>${s.name}</b><br>Step ${step + 1}: ${s.data[step]}`;
  } else {
    let lines = [`<b>Step ${step + 1}</b>`];
    series.forEach(s => { lines.push(`<span style="color:${s.color}">\u25CF</span> ${s.name}: ${s.data[step]}`); });
    tooltip.innerHTML = lines.join('<br>');
  }
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
});
canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  if (hoverLine !== null) { hoverLine = null; draw(); }
});

draw();
</script>
</body>
</html>
